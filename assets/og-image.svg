<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&amp;family=JetBrains+Mono:wght@300;400;500&amp;display=swap');
      .bg { fill: #f4f2ec; }
      .fg { fill: #1a1a1a; }
      .muted { fill: #6b6b6b; }
      .line { stroke: rgba(26,26,26,0.12); stroke-width: 1; }
      .brand-display { font-family: 'Fraunces', Georgia, serif; font-weight: 300; fill: #1a1a1a; }
      .brand-italic { font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-style: italic; fill: #1a1a1a; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #6b6b6b; }
      .mono-fg { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" width="1200" height="630"/>

  <!-- subtle top and bottom rule lines matching site -->
  <line class="line" x1="96" y1="90" x2="1104" y2="90"/>
  <line class="line" x1="96" y1="540" x2="1104" y2="540"/>

  <!-- top meta line, mirroring site header -->
  <g>
    <!-- pulse dot -->
    <circle cx="107" cy="67" r="5" fill="#4ade80"/>
    <text class="mono" x="122" y="72" font-size="14" letter-spacing="1.2">BIJGEHOUDEN WEKELIJKS</text>
    <text class="mono" x="1104" y="72" font-size="14" letter-spacing="1.2" text-anchor="end">MARVINJACOBS.COM</text>
  </g>

  <!-- Large brand mark -->
  <text class="brand-italic" x="96" y="280" font-size="180" letter-spacing="-5">Marvin's</text>
  <text class="brand-display" x="96" y="420" font-size="180" letter-spacing="-5">Picks</text>

  <!-- Tagline -->
  <text class="mono-fg" x="96" y="495" font-size="20" letter-spacing="0.5">Wekelijkse podcast-aanbevelingen van Marvin Jacobs.</text>
  <text class="mono" x="96" y="522" font-size="20" letter-spacing="0.5">Airborne Network · LINDA. Professor Podcast</text>

  <!-- Footer meta -->
  <text class="mono" x="96" y="585" font-size="13" letter-spacing="1.5">ARCHIEF — PODCAST VOOR DE WEEK</text>
  <text class="mono" x="1104" y="585" font-size="13" letter-spacing="1.5" text-anchor="end">VINCENT.WORKS</text>
</svg>
