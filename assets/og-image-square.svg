<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&amp;family=JetBrains+Mono:wght@300;400;500&amp;display=swap');
      .bg { fill: #f4f2ec; }
      .fg { fill: #1a1a1a; }
      .muted { fill: #6b6b6b; }
      .line { stroke: rgba(26,26,26,0.12); stroke-width: 1; }
      .brand-display { font-family: 'Fraunces', Georgia, serif; font-weight: 300; fill: #1a1a1a; }
      .brand-italic { font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-style: italic; fill: #1a1a1a; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #6b6b6b; }
      .mono-fg { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #1a1a1a; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1200"/>

  <!-- header rule -->
  <line class="line" x1="96" y1="140" x2="1104" y2="140"/>

  <!-- top meta -->
  <circle cx="107" cy="105" r="6" fill="#4ade80"/>
  <text class="mono" x="128" y="111" font-size="18" letter-spacing="1.5">BIJGEHOUDEN WEKELIJKS</text>
  <text class="mono" x="1104" y="111" font-size="18" letter-spacing="1.5" text-anchor="end">ARCHIEF — PODCAST VOOR DE WEEK</text>

  <!-- Centered brand -->
  <text class="brand-italic" x="600" y="540" font-size="240" letter-spacing="-6" text-anchor="middle">Marvin's</text>
  <text class="brand-display" x="600" y="720" font-size="240" letter-spacing="-6" text-anchor="middle">Picks</text>

  <!-- Spacer rule -->
  <line class="line" x1="400" y1="820" x2="800" y2="820"/>

  <!-- Tagline -->
  <text class="mono-fg" x="600" y="895" font-size="26" letter-spacing="0.5" text-anchor="middle">Wekelijkse podcast-aanbevelingen</text>
  <text class="mono-fg" x="600" y="935" font-size="26" letter-spacing="0.5" text-anchor="middle">van Marvin Jacobs</text>

  <text class="mono" x="600" y="990" font-size="20" letter-spacing="0.4" text-anchor="middle">Airborne Network · LINDA. Professor Podcast</text>

  <!-- footer -->
  <line class="line" x1="96" y1="1080" x2="1104" y2="1080"/>
  <text class="mono" x="96" y="1122" font-size="16" letter-spacing="1.5">MARVINJACOBS.COM</text>
  <text class="mono" x="1104" y="1122" font-size="16" letter-spacing="1.5" text-anchor="end">VINCENT.WORKS</text>
</svg>
