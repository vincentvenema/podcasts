<style>
:root {
  --bg: #f4f2ec;
  --fg: #1a1a1a;
  --muted: #6b6b6b;
  --line: rgba(26, 26, 26, 0.12);
  --accent: #1a1a1a;
  --display: 'Fraunces', Georgia, serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding: 0 32px;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 80px 0 120px;
}

/* Header */
header {
  margin-bottom: 80px;
}

.brand {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(40px, 7vw, 72px);
  letter-spacing: -0.03em;
  line-height: 0.95;
  margin-bottom: 24px;
}

.brand em {
  font-style: italic;
  font-weight: 400;
}

.header-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 48px;
  align-items: start;
}

.intro {
  max-width: 520px;
  color: var(--muted);
  margin-bottom: 0;
  font-size: 14px;
}

.intro a {
  color: var(--fg);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}

.meta-line {
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
}

.meta-line span {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-end;
}

.meta-line strong {
  font-weight: inherit;
}

.meta-icon {
  width: 12px;
  height: 12px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.4;
  stroke-linecap: round;
  flex-shrink: 0;
}

.meta-icon-spotify {
  width: 13px;
  height: 13px;
  stroke-width: 1.6;
  stroke-linejoin: round;
}

.link-fg {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.meta-line a.link-fg {
  color: inherit;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}

.pulse {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s infinite;
}

/* Right-side group inside section label (layout toggle + count) */
.section-label-right {
  display: inline-flex;
  align-items: center;
  gap: 14px;
}

.layout-toggle {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px;
  border: 1px solid var(--line);
  border-radius: 100px;
}

.layout-toggle button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 22px;
  border: none;
  border-radius: 100px;
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s ease;
  padding: 0;
}

.layout-toggle button:hover {
  color: var(--fg);
}

.layout-toggle button.is-active {
  background: var(--fg);
  color: var(--bg);
}

.layout-toggle svg {
  width: 12px;
  height: 12px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
}

/* Compact-mode: ultra-dense list view (applies to weekly picks only) */
body.mode-compact .picks .pick {
  grid-template-columns: 36px 1fr auto;
  gap: 14px;
  padding: 8px 0;
  align-items: center;
}

body.mode-compact .picks .pick-artwork {
  width: 36px;
  height: 36px;
  border-radius: 4px;
}

body.mode-compact .picks .pick-artwork.no-art {
  font-size: 16px;
}

body.mode-compact .picks .pick-week {
  display: none;
}

body.mode-compact .picks .pick-title {
  font-size: 15px;
  margin-bottom: 0;
  letter-spacing: 0;
  line-height: 1.35;
  font-family: var(--mono);
  font-weight: 400;
}

body.mode-compact .picks .pick-makers {
  font-size: 11px;
  margin-bottom: 0;
  color: var(--muted);
}

body.mode-compact .picks .pick-description,
body.mode-compact .picks .pick-note,
body.mode-compact .picks .pick-category {
  display: none;
}

body.mode-compact .picks .pick-action {
  font-size: 11px;
  align-self: center;
}

body.mode-compact .picks .pick-action a {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 100px;
}

body.mode-compact .picks .pick-action .pick-listened,
body.mode-compact .picks .pick-action .pick-mark-btn {
  padding: 4px 9px;
  font-size: 10px;
}

/* hover no background in compact (keeps density clean) */
body.mode-compact .picks .pick:hover {
  background: transparent;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Section heading */
.section-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 40px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.section-label .count {
  color: var(--muted);
  margin-left: 6px;
  font-weight: inherit;
}

.section-label > span:first-child {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.section-title-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: inherit;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
  transition: color 0.2s ease;
}

.section-title-link:hover {
  color: var(--fg);
}

/* Picks list */
.picks {
  list-style: none;
  margin-bottom: 96px;
}

.pick {
  display: grid;
  grid-template-columns: 120px 1fr auto;
  gap: 24px;
  padding: 22px 0;
  border-top: 1px solid var(--line);
  align-items: start;
  transition: background 0.3s ease;
  position: relative;
}

.pick:first-child {
  border-top: none;
  padding-top: 4px;
}

.pick:hover {
  background: rgba(26, 26, 26, 0.02);
}

.pick-artwork {
  width: 120px;
  height: 120px;
  background: #e5e2d9;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

.pick-artwork img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.pick-artwork.no-art {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-style: italic;
  font-size: 30px;
  font-weight: 300;
  color: var(--muted);
  background: linear-gradient(135deg, #e8e5dc 0%, #d8d4c9 100%);
}

.pick-body {
  min-width: 0;
}

.pick-week {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 10px;
  font-variant-numeric: tabular-nums;
}

.pick-title {
  font-family: var(--display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 4px;
}

.pick-title a {
  color: var(--fg);
  text-decoration: none;
}

.pick-title a:hover {
  font-style: italic;
}

.pick-makers {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.pick-description {
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--fg);
  max-width: none;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.pick-note {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  max-width: none;
}

.pick-category {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
}

.pick-action {
  align-self: center;
  font-size: 12px;
  white-space: nowrap;
}

.pick-action a {
  color: var(--fg);
  text-decoration: none;
  padding: 8px 14px;
  border: 1px solid var(--line);
  border-radius: 100px;
  transition: all 0.2s ease;
  display: inline-block;
}

.pick-action a:hover {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}

.pick-action .missing {
  color: var(--muted);
  padding: 8px 14px;
  font-style: italic;
}

/* Compact variant for best-of */
.pick--compact {
  grid-template-columns: 60px 1fr auto;
  gap: 6px 20px;
  padding: 20px 0;
}

.pick--compact .pick-artwork {
  width: 60px;
  height: 60px;
}

.pick--compact .pick-artwork.no-art {
  font-size: 22px;
}

.pick--compact .pick-title {
  font-size: 20px;
  margin-bottom: 2px;
  letter-spacing: -0.01em;
}

.pick--compact .pick-makers {
  font-size: 11px;
  margin-bottom: 4px;
}

.pick--compact .pick-description {
  font-size: 13px;
  line-height: 1.5;
  color: var(--muted);
  margin-bottom: 0;
  margin-top: 4px;
}

.pick--compact .pick-category {
  display: none;
}

.pick--compact .pick-action {
  font-size: 11px;
}

.pick--compact .pick-action a {
  padding: 6px 10px;
}

/* Listened marker */
.pick-listened,
.pick-mark-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: 100px;
  white-space: nowrap;
  cursor: pointer;
  background: transparent;
  font-family: var(--mono);
  transition: all 0.2s ease;
}

.pick-listened {
  color: var(--muted);
}

.pick-listened::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
}

.pick-listened:hover {
  color: var(--fg);
  border-color: var(--fg);
}

.pick-listened:hover::before {
  background: var(--fg);
}

.pick-mark-btn {
  color: var(--muted);
  opacity: 0;
  transition: opacity 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.pick:hover .pick-mark-btn {
  opacity: 1;
}

.pick-mark-btn:hover {
  color: var(--fg);
  border-color: var(--fg);
}

.pick.is-listened .pick-artwork {
  opacity: 0.55;
}

.pick.is-listened .pick-title {
  color: var(--muted);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 28px;
  align-items: center;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--line);
}
.tabs .layout-toggle {
  margin-left: auto;
  margin-bottom: 8px;
}
.tab {
  appearance: none;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  padding: 0 0 14px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease;
}
.tab:hover { color: var(--fg); }
.tab.is-active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}
.tab-count { margin-left: 6px; color: var(--muted); }
.tab-panel.hidden { display: none; }
/* counts now live in the tabs, not the in-panel label */
.tab-panel .section-label .count { display: none; }

/* Best of 2025 */
.best-of {
  margin-top: 0;
  opacity: 1;
}

.best-of .section-label {
  margin-bottom: 24px;
}

.best-of-intro {
  color: var(--muted);
  max-width: 520px;
  margin-bottom: 24px;
  font-size: 12.5px;
}

/* Footer */
footer {
  margin-top: 120px;
  padding-top: 32px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

footer a {
  color: var(--fg);
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* Mobile */
@media (max-width: 640px) {
  body { padding: 0 20px; font-size: 14px; }
  .container { padding: 48px 0 80px; }
  .brand { font-size: 44px; }
  header { margin-bottom: 48px; }

  .header-row {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .meta-line {
    text-align: left;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px 20px;
    white-space: normal;
  }
  .meta-line span {
    justify-content: flex-start;
  }

  .pick {
    grid-template-columns: 80px 1fr;
    gap: 8px 16px;
    padding: 24px 0;
  }

  .pick-artwork { width: 80px; height: 80px; }
  .pick-artwork.no-art { font-size: 30px; }
  .pick-title { font-size: 22px; }

  .pick-action {
    grid-column: 1 / -1;
    align-self: start;
    margin-top: 8px;
  }

  .pick--compact {
    grid-template-columns: 50px 1fr;
  }
  .pick--compact .pick-artwork { width: 50px; height: 50px; }

  .pick-mark-btn { opacity: 1; }
}

/* Loading state */
.loading {
  text-align: center;
  padding: 40px 0;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>

<script>
// ============================================================================
// Config
// ============================================================================
// API_BASE: leeg = relatief (zelfde origin als de site) — dit werkt als de
// Worker je site serveert. Anders: zet de volledige worker-URL:
//   const API_BASE = 'https://marvin-picks.your-subdomain.workers.dev';
const API_BASE = '';

const LS_TOKEN_KEY = 'marvin-picks-token';
const LS_LISTENED_FALLBACK = 'marvin-picks-listened';

// Token management — prompt once, store in localStorage
function getToken() {
  return localStorage.getItem(LS_TOKEN_KEY) || '';
}
function setToken(t) {
  if (t) localStorage.setItem(LS_TOKEN_KEY, t);
  else localStorage.removeItem(LS_TOKEN_KEY);
}

// Expose helpers to the console for convenience:
//   marvin.setToken('your-refresh-token')
//   marvin.clearToken()
window.marvin = {
  setToken: (t) => { setToken(t); rerender(); },
  clearToken: () => { setToken(''); rerender(); },
  hasToken: () => !!getToken(),
};

// ============================================================================
// Local fallback (when worker isn't deployed yet)
// ============================================================================
function getListenedSet() {
  try {
    return new Set(JSON.parse(localStorage.getItem(LS_LISTENED_FALLBACK) || '[]'));
  } catch {
    return new Set();
  }
}

function setListenedLocal(id, value) {
  const set = getListenedSet();
  if (value) set.add(id); else set.delete(id);
  localStorage.setItem(LS_LISTENED_FALLBACK, JSON.stringify([...set]));
}

function pickId(p) {
  return p.title.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function isListened(p) {
  return p.listened === true || getListenedSet().has(pickId(p));
}

// ============================================================================
// Persist toggles — POST to worker if token available, else localStorage
// ============================================================================
async function toggleListened(p, value) {
  const token = getToken();
  const id = pickId(p);

  if (token) {
    // Try worker first
    try {
      const endpoint = value ? '/api/mark' : '/api/unmark';
      const res = await fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({ id }),
      });
      if (res.ok) {
        // Update the in-memory data immediately
        if (value) p.listened = true; else delete p.listened;
        return { persisted: 'remote' };
      }
      if (res.status === 401) {
        alert('Ongeldig token. Wis met marvin.clearToken() of stel opnieuw in.');
      }
    } catch (err) {
      console.warn('Worker not reachable, falling back to localStorage', err);
    }
  }

  // Fallback: localStorage only (visible only to you, only in this browser)
  setListenedLocal(id, value);
  if (value) p.listened = true; else delete p.listened;
  return { persisted: 'local' };
}

// Format week label
function formatWeek(weekStr, dateStr) {
  const date = new Date(dateStr);
  const months = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
  const [year, week] = weekStr.split('-');
  return `${year} - ${week} · ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

// Format full Dutch date: 2026-04-19 → 19 april 2026
function formatDateLong(dateStr) {
  if (!dateStr) return '—';
  const date = new Date(dateStr);
  if (isNaN(date)) return dateStr;
  const months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

// Build pick HTML
function buildPick(p, showWeek = true, compact = false) {
  const li = document.createElement('li');
  const listened = isListened(p);
  li.className = 'pick' + (compact ? ' pick--compact' : '') + (listened ? ' is-listened' : '');
  li.dataset.pickId = pickId(p);

  // Artwork
  const artwork = document.createElement('div');
  artwork.className = 'pick-artwork';
  if (p.spotify_id) {
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = `${p.title} artwork`;
    // Fetch cover from oEmbed
    fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/show/${p.spotify_id}`)
      .then(r => r.json())
      .then(data => {
        if (data.thumbnail_url) img.src = data.thumbnail_url;
        else showInitial(artwork, p.title);
      })
      .catch(() => showInitial(artwork, p.title));
    artwork.appendChild(img);
  } else {
    showInitial(artwork, p.title);
  }

  // Body
  const body = document.createElement('div');
  body.className = 'pick-body';

  const title = document.createElement('h3');
  title.className = 'pick-title';
  if (p.spotify_url) {
    const a = document.createElement('a');
    a.href = p.spotify_url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.title;
    title.appendChild(a);
  } else {
    title.textContent = p.title;
  }
  body.appendChild(title);

  const makers = document.createElement('div');
  makers.className = 'pick-makers';
  makers.textContent = p.makers;
  body.appendChild(makers);

  const desc = document.createElement('p');
  desc.className = 'pick-description';
  desc.textContent = p.description;
  body.appendChild(desc);

  if (p.note) {
    const note = document.createElement('p');
    note.className = 'pick-note';
    note.textContent = p.note;
    body.appendChild(note);
  }

  // Combined meta: week · date — category
  if ((showWeek && p.week) || p.category) {
    const meta = document.createElement('div');
    meta.className = 'pick-week';
    let parts = [];
    if (showWeek && p.week) parts.push(formatWeek(p.week, p.date));
    if (p.category) parts.push(`· ${p.category.replace('-', ' ')}`);
    meta.textContent = parts.join(' ');
    body.appendChild(meta);
  }

  // Action
  const action = document.createElement('div');
  action.className = 'pick-action';

  if (listened) {
    const marker = document.createElement('button');
    marker.className = 'pick-listened';
    marker.type = 'button';
    marker.textContent = 'Beluisterd';
    marker.title = getToken()
      ? 'Klik om te ontmarkeren'
      : 'Lokaal gemarkeerd — alleen zichtbaar in deze browser';
    marker.addEventListener('click', async () => {
      marker.disabled = true;
      await toggleListened(p, false);
      rerender();
    });
    action.appendChild(marker);
  } else {
    // Open-link
    if (p.spotify_url) {
      const a = document.createElement('a');
      a.href = p.spotify_url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = 'Open ↗';
      action.appendChild(a);
    }
    // "Markeer als beluisterd" button
    const markBtn = document.createElement('button');
    markBtn.className = 'pick-mark-btn';
    markBtn.type = 'button';
    markBtn.textContent = 'Markeer';
    markBtn.title = getToken()
      ? 'Markeer als beluisterd (publiek)'
      : 'Markeer als beluisterd (alleen in deze browser — voeg token toe voor publieke sync)';
    markBtn.addEventListener('click', async () => {
      markBtn.disabled = true;
      await toggleListened(p, true);
      rerender();
    });
    action.appendChild(markBtn);
  }

  li.appendChild(artwork);
  li.appendChild(body);
  li.appendChild(action);

  return li;
}

function showInitial(el, title) {
  el.innerHTML = '';
  el.classList.add('no-art');
  el.textContent = title.charAt(0);
}

// Keep a reference to the data for re-rendering after toggles
let CURRENT_DATA = null;

function render(data) {
  CURRENT_DATA = data;
  document.getElementById('last-checked').textContent = formatDateLong(data.meta.last_checked);

  const weekly = [...data.weeks].sort((a, b) => b.date.localeCompare(a.date));
  const weeklyList = document.getElementById('weekly-picks');
  weeklyList.innerHTML = '';
  weekly.forEach(p => weeklyList.appendChild(buildPick(p, true)));
  const wc = document.getElementById('weekly-count');
  if (wc) wc.textContent = '(' + String(weekly.length).padStart(2, '0') + ')';

  const bestList = document.getElementById('best-picks');
  bestList.innerHTML = '';
  data.best_of_2025.forEach(p => bestList.appendChild(buildPick(p, false, true)));
  const bc = document.getElementById('best-count');
  if (bc) bc.textContent = '(' + String(data.best_of_2025.length).padStart(2, '0') + ')';
  document.getElementById('tab-weekly-count').textContent = ' (' + String(weekly.length).padStart(2, '0') + ')';
  document.getElementById('tab-best-count').textContent = ' (' + String(data.best_of_2025.length).padStart(2, '0') + ')';

  injectItemListSchema(weekly, data.best_of_2025);
}

function injectItemListSchema(weekly, bestOf) {
  // Build a schema.org ItemList so podcasts are surfaced to search engines
  const buildItems = (items, kind) => items
    .filter(p => p.spotify_url)
    .map((p, i) => ({
      "@type": "ListItem",
      "position": i + 1,
      "item": {
        "@type": "PodcastSeries",
        "name": p.title,
        "description": p.description,
        "url": p.spotify_url,
        "author": p.makers ? { "@type": "Organization", "name": p.makers } : undefined,
        "inLanguage": "nl"
      }
    }));

  const schema = [
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Podcast voor de Week — wekelijkse picks",
      "description": "Chronologisch archief van Marvin Jacobs' wekelijkse podcast-aanbevelingen.",
      "numberOfItems": weekly.length,
      "itemListElement": buildItems(weekly, 'weekly')
    },
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Beste podcasts van 2025 — Professor Podcast",
      "description": "Marvin Jacobs' selectie van de beste verhalende podcasts van 2025, gepubliceerd op LINDA.nl.",
      "numberOfItems": bestOf.length,
      "itemListElement": buildItems(bestOf, 'best')
    }
  ];

  // Remove existing dynamic schema, inject fresh one
  document.querySelectorAll('script[data-dynamic-schema]').forEach(el => el.remove());
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.setAttribute('data-dynamic-schema', '');
  s.textContent = JSON.stringify(schema);
  document.head.appendChild(s);
}

function rerender() {
  if (CURRENT_DATA) render(CURRENT_DATA);
}

// Try to fetch fresher data from /podcasts.json (when deployed via worker),
// fall back to inline data if that fails (file:// or preview mode).
// ============================================================================
// Layout toggle (comfortable / compact) with localStorage persistence
// ============================================================================
const LS_LAYOUT = 'marvin-picks-layout';

function applyLayout(mode) {
  document.body.classList.toggle('mode-compact', mode === 'compact');
  document.getElementById('layout-compact').classList.toggle('is-active', mode === 'compact');
  document.getElementById('layout-comfortable').classList.toggle('is-active', mode !== 'compact');
  try { localStorage.setItem(LS_LAYOUT, mode); } catch {}
}

(function initLayout() {
  let saved = 'comfortable';
  try { saved = localStorage.getItem(LS_LAYOUT) || 'comfortable'; } catch {}
  applyLayout(saved);
  document.getElementById('layout-comfortable').addEventListener('click', () => applyLayout('comfortable'));
  document.getElementById('layout-compact').addEventListener('click', () => applyLayout('compact'));
})();

// ============================================================================
// Tabs (Podcast voor de Week / Beste van 2025)
// ============================================================================
(function initTabs() {
  const tabs = [
    { btn: 'tab-weekly', panel: 'podcast-voor-de-week' },
    { btn: 'tab-best', panel: 'beste-van-2025' },
  ];
  function activate(which) {
    tabs.forEach(t => {
      const on = t.btn === which;
      document.getElementById(t.btn).classList.toggle('is-active', on);
      document.getElementById(t.panel).classList.toggle('hidden', !on);
    });
  }
  tabs.forEach(t =>
    document.getElementById(t.btn).addEventListener('click', () => activate(t.btn))
  );
})();

// ============================================================================
// Data fetch
// ============================================================================
fetch((API_BASE || '.') + '/podcasts.json')
  .then(r => {
    if (!r.ok) throw new Error('not available');
    const ct = r.headers.get('content-type') || '';
    if (!ct.includes('json')) throw new Error('not json');
    return r.json();
  })
  .then(data => render(data))
  .catch(() => render(INLINE_DATA));
</script>
